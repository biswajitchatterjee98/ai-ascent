<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login · AI Ascent</title>
<meta name="description" content="Sign in to access the AI Ascent learning guide." />
<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>AscentAuth.requireGuest();</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap');
:root{
  --bg:#f3f6f4;--ink:#142033;--muted:#5b6777;--card:#fff;--line:#d7e0db;
  --accent:#0f7a6c;--accent-deep:#0b5a51;--accent-soft:#e4f4f0;--navy:#12324a;
  --shadow:0 18px 48px rgba(18,50,74,.12);
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;color:var(--ink);
  font-family:"Source Sans 3",ui-sans-serif,system-ui,sans-serif;line-height:1.6;
  background:
    radial-gradient(900px 420px at 8% -8%, rgba(15,122,108,.16), transparent 55%),
    radial-gradient(800px 380px at 100% 0%, rgba(18,50,74,.12), transparent 50%),
    linear-gradient(165deg,#e8f0ec 0%, var(--bg) 42%, #eef2f5 100%);
  display:grid;place-items:center;padding:1.5rem;
}
.shell{
  width:min(980px,100%);
  display:grid;grid-template-columns:1.05fr .95fr;gap:0;
  background:var(--card);border:1px solid var(--line);border-radius:28px;
  overflow:hidden;box-shadow:var(--shadow);
  animation:rise .55s ease both;
}
@media(max-width:860px){.shell{grid-template-columns:1fr}}
.brand-pane{
  position:relative;padding:2.2rem 2rem;
  background:
    linear-gradient(145deg, rgba(18,50,74,.94), rgba(11,90,81,.90) 55%, rgba(15,122,108,.88)),
    radial-gradient(420px 220px at 90% 10%, rgba(255,255,255,.16), transparent 60%);
  color:#f4fffc;
}
.brand-pane::after{
  content:"";position:absolute;right:-40px;bottom:-50px;width:180px;height:180px;
  border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none;
}
.logo{
  width:min(240px,70%);background:#fff;border-radius:14px;padding:.65rem .9rem;
  box-shadow:0 10px 28px rgba(0,0,0,.18);margin-bottom:1.6rem;
}
.brand-pane h1{
  margin:0 0 .7rem;font-family:Fraunces,Georgia,serif;
  font-size:clamp(2rem,4vw,2.6rem);letter-spacing:-.02em;line-height:1.15;
}
.brand-pane p{margin:0;max-width:34ch;opacity:.92;font-size:1.02rem}
.points{list-style:none;padding:0;margin:1.6rem 0 0}
.points li{
  margin:.55rem 0;padding:.55rem .75rem .55rem 2.4rem;position:relative;
  background:rgba(255,255,255,.08);border-radius:12px;font-size:.95rem;
}
.points li::before{
  content:"";position:absolute;left:.85rem;top:50%;width:.55rem;height:.55rem;
  margin-top:-.27rem;border-radius:50%;background:#9fe3d4;
}
.form-pane{padding:2.2rem 2rem 1.8rem;display:flex;flex-direction:column;justify-content:center}
.form-pane h2{
  margin:0 0 .35rem;font-family:Fraunces,Georgia,serif;color:var(--navy);font-size:1.7rem;
}
.lead{margin:0 0 1.25rem;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:.35rem;margin:0 0 .9rem}
.field label{font-size:.88rem;font-weight:700;color:var(--navy)}
.field input{
  width:100%;font:inherit;color:var(--ink);background:#fff;
  border:1px solid #c9d5cf;border-radius:12px;padding:.85rem .95rem;outline:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.actions{display:flex;flex-direction:column;gap:.7rem;margin-top:.4rem}
button.primary{
  border:0;border-radius:12px;padding:.9rem 1.2rem;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  color:#fff;font:700 1rem "Source Sans 3",sans-serif;
  box-shadow:0 10px 22px rgba(15,122,108,.28);
}
button.primary:hover{filter:brightness(1.05)}
.error{
  display:none;margin:0 0 .9rem;padding:.75rem .9rem;border-radius:11px;
  background:#fdecea;color:#8a1f1a;font-weight:600;font-size:.92rem;
}
.error.show{display:block}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="shell">
  <section class="brand-pane">
    <img class="logo" src="images/traininglobe-logo.png" alt="Traininglobe" />
    <h1>AI Ascent</h1>
    <p>Sign in to open the practitioner handbook, tools guidance, and registration flow.</p>
    <ul class="points">
      <li>27 topics from foundations to automation</li>
      <li>STAR and CREATE prompting methods</li>
      <li>Guided practice for real work scenarios</li>
    </ul>
  </section>
  <section class="form-pane">
    <h2>Welcome back</h2>
    <p class="lead">Sign in with the username and password you were given.</p>
    <p id="login-error" class="error" role="alert"></p>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="actions">
        <button class="primary" type="submit">Sign in</button>
      </div>
    </form>
  </section>
</div>
<script>
(function () {
  document.getElementById("login-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var err = document.getElementById("login-error");
    err.classList.remove("show");
    err.textContent = "";
    AscentAuth.login(
      document.getElementById("username").value,
      document.getElementById("password").value
    ).then(function (result) {
      if (!result.ok) {
        err.textContent = result.error || "Invalid username or password.";
        err.classList.add("show");
        return;
      }
      var params = new URLSearchParams(location.search);
      var next = params.get("next") || "index.html";
      var page = String(next).split(/[?#]/)[0];
      if (!/^[A-Za-z0-9._-]+\.html$/.test(page)) next = "index.html";
      location.href = next;
    });
  });
})();
</script>
</body>
</html>
